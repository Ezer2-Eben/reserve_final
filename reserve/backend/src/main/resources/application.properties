# Configuration existante...
spring.application.name=webApp-reserve-admin
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/reserve}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.hibernate.ddl-auto=update

# Server
server.port=${PORT:9190}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.reserve.admin=DEBUG

# Configuration JWT
jwt.secret=${JWT_SECRET:cette_cle_est_longue_et_secrete_avec_au_moins_64_caracteres!!1234567890}

# Configuration pour les uploads de fichiers
app.upload.path=uploads
app.upload.max-size=10485760
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Nouveau : Configuration pour les données géospatiales
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=INTEGER
spring.jpa.properties.hibernate.dialect.storage_engine=innodb

# IMPORTANT : Désactiver la validation JSON stricte pour MySQL 8
spring.jpa.properties.hibernate.jdbc.time_zone=UTC