<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond circulaire avec dégradé -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0967D2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cercle de fond -->
  <circle cx="60" cy="60" r="55" fill="url(#bgGradient)" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- Icône de carte/zone -->
  <path d="M30 40 L50 30 L90 30 L110 40 L110 80 L90 90 L50 90 L30 80 Z" 
        fill="white" fill-opacity="0.9" stroke="#0967D2" stroke-width="1.5"/>
  
  <!-- Lignes de grille sur la carte -->
  <line x1="40" y1="35" x2="100" y2="35" stroke="#0967D2" stroke-width="0.8" opacity="0.6"/>
  <line x1="40" y1="45" x2="100" y2="45" stroke="#0967D2" stroke-width="0.8" opacity="0.6"/>
  <line x1="40" y1="55" x2="100" y2="55" stroke="#0967D2" stroke-width="0.8" opacity="0.6"/>
  <line x1="40" y1="65" x2="100" y2="65" stroke="#0967D2" stroke-width="0.8" opacity="0.6"/>
  <line x1="40" y1="75" x2="100" y2="75" stroke="#0967D2" stroke-width="0.8" opacity="0.6"/>
  <line x1="40" y1="85" x2="100" y2="85" stroke="#0967D2" stroke-width="0.8" opacity="0.6"/>
  
  <!-- Lignes verticales -->
  <line x1="50" y1="30" x2="50" y2="90" stroke="#0967D2" stroke-width="0.8" opacity="0.6"/>
  <line x1="60" y1="30" x2="60" y2="90" stroke="#0967D2" stroke-width="0.8" opacity="0.6"/>
  <line x1="70" y1="30" x2="70" y2="90" stroke="#0967D2" stroke-width="0.8" opacity="0.6"/>
  <line x1="80" y1="30" x2="80" y2="90" stroke="#0967D2" stroke-width="0.8" opacity="0.6"/>
  <line x1="90" y1="30" x2="90" y2="90" stroke="#0967D2" stroke-width="0.8" opacity="0.6"/>
  
  <!-- Zone protégée (polygone vert) -->
  <polygon points="55,45 75,40 85,55 75,70 55,75 45,60" 
           fill="url(#leafGradient)" fill-opacity="0.8" 
           stroke="#10B981" stroke-width="2"/>
  
  <!-- Icône de feuille dans la zone -->
  <path d="M65 55 Q70 50 75 55 Q70 60 65 55" 
        fill="white" fill-opacity="0.9"/>
  
  <!-- Point de localisation -->
  <circle cx="70" cy="60" r="3" fill="#EF4444" stroke="white" stroke-width="1"/>
  
  <!-- Étoile de protection -->
  <g transform="translate(85, 35)">
    <path d="M0,-8 L2.5,-2.5 L8,0 L2.5,2.5 L0,8 L-2.5,2.5 L-8,0 L-2.5,-2.5 Z" 
          fill="#F59E0B" stroke="white" stroke-width="0.5"/>
  </g>
  
  <!-- Texte "R" stylisé -->
  <text x="60" y="105" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="16" font-weight="bold" fill="#0967D2">RÉSERVES</text>
</svg>








