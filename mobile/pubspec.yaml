name: reserve
description: "Application de délimitation de réserves administratives"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  readmore: ^3.0.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
  
  # Cartographie Mapbox et localisation
  mapbox_maps_flutter: ^2.0.0
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  geocoding: ^2.1.1
  
  # Calculs géométriques
  latlong2: ^0.9.0
  turf: ^0.0.9
  
  # UI/UX avancé
  flutter_slidable: ^3.0.1
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  
  # Utilitaires
  intl: ^0.18.1
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

# Configuration des icônes de l'application
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 48 # min:48, max:256, default: 48