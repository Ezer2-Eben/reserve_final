# Configuration existante...
spring.application.name=webApp-reserve-admin
spring.datasource.url=jdbc:mysql://localhost:3306/reserve
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Server
server.port=9190

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.reserve.admin=DEBUG

# Configuration JWT
jwt.secret=cette_cle_est_longue_et_secrete_avec_au_moins_64_caracteres!!1234567890

# Configuration pour les uploads de fichiers
app.upload.path=uploads
app.upload.max-size=10485760
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Nouveau : Configuration pour les données géospatiales
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=INTEGER
spring.jpa.properties.hibernate.dialect.storage_engine=innodb

# IMPORTANT : Désactiver la validation JSON stricte pour MySQL 8
spring.jpa.properties.hibernate.jdbc.time_zone=UTC