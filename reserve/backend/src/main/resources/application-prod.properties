# ============================================================
# Profil PRODUCTION pour Render.com (PostgreSQL)
# ============================================================

# Render fournit DATABASE_URL au format: postgresql://user:pass@host/db
# Spring Boot a besoin du format: jdbc:postgresql://host:5432/db
# On configure les 3 variables séparées directement via Render
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate pour PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Desactiver les options spécifiques à MySQL
spring.jpa.properties.hibernate.dialect.storage_engine=

# Server port (Render injecte PORT automatiquement)
server.port=${PORT:10000}

# JWT
jwt.secret=${JWT_SECRET}

# Upload (pas de stockage persistant sur Render free tier - OK pour démo)
app.upload.path=uploads
app.upload.max-size=10485760
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging minimal en production
logging.level.org.springframework.security=WARN
logging.level.com.reserve.admin=WARN
